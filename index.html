<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chíp tây</title>

<style>
:root {
  --bg: #ffe6f0;
  --card: #ffffff;
  --text: #222;
  --primary: #ffcc00;
  --edit: #4caf50;
  --delete: #f44336;
}

.dark {
  --bg: #1e1e1e;
  --card: #2a2a2a;
  --text: #ffffff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.total {
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
}

.tip-total {
  font-size: 16px;
  margin-bottom: 10px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  border: none;
  border-radius: 10px;
  padding: 10px 15px;
  font-size: 14px;
  cursor: pointer;
}

.add-btn {
  background: var(--primary);
  width: 100%;
  margin-top: 10px;
}

.list {
  margin-top: 15px;
}

.item {
  background: var(--card);
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 10px;
}

.item-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.time {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 4px;
}

.actions button {
  margin-left: 5px;
  font-size: 12px;
}

.edit-btn {
  background: var(--edit);
  color: white;
}

.delete-btn {
  background: var(--delete);
  color: white;
}

.reset {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #888;
  color: white;
}

.icon-btn {
  position: fixed;
  top: 10px;
  background: #666;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
}

.dark-btn { right: 10px; }
.tip-btn { right: 60px; }
.coc-btn { right: 110px; }
.history-btn { right: 170px; }

.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.popup-box {
  background: var(--card);
  width: 95%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
  border-radius: 20px;
}

.popup h2 {
  margin-top: 0;
}

.close-btn {
  background: #999;
  margin-top: 10px;
  width: 100%;
}
.corner-image {
  position: fixed;
  top: 50px;   /* cách top 60px */
  right: 10px;    /* cách phải 10px */
  width: 120px;    /* chỉnh kích thước */
  opacity: 0.8;   /* độ mờ nhẹ */
  z-index: 1;     /* nằm dưới popup */
  pointer-events: none; /* không che nút bấm */
}
</style>
</head>

<body>
<div class="container">
  <h1>Chíp tây</h1>

  <div class="total" id="total">Tổng hôm nay: 0 đ</div>
  <div class="tip-total" id="tipTotal">Tip: 0 đ</div>

  <input type="number" id="moneyInput" placeholder="Nhập số (vd: 9 = 900k)">
  <button class="add-btn" onclick="addMoney()">Thêm</button>

  <div class="list" id="list"></div>
</div>

<button class="reset" onclick="resetAll()">Reset</button>

<button class="icon-btn history-btn" onclick="openHistory()">📅</button>
<button class="icon-btn coc-btn" onclick="openCoc()">💰</button>
<button class="icon-btn tip-btn" onclick="openTip()">💸</button>
<button class="icon-btn dark-btn" onclick="toggleTheme()">🌙</button>

<!-- TIP POPUP -->
<div class="popup-overlay" id="tipPopup">
  <div class="popup-box">
  <h2>Tip</h2>
  <div class="total" id="tipPopupTotal">Tổng Tip: 0 đ</div>
  <input type="number" id="tipInput" placeholder="Nhập số">
  <button class="add-btn" onclick="addTip()">Thêm</button>
  <div class="list" id="tipList"></div>
  <button class="close-btn" onclick="closeTip()">Đóng</button>
</div></div>

<!-- COC POPUP -->
<div class="popup-overlay" id="cocPopup">
  <div class="popup-box">
  <h2>Cọc</h2>
  <div class="total" id="cocTotal">Tổng Cọc: 0 đ</div>
  <input type="number" id="cocInput" placeholder="Nhập số">
  <button class="add-btn" onclick="addCoc()">Thêm</button>
  <button class="close-btn" onclick="closeCoc()">Đóng</button>
</div></div>

<!-- HISTORY POPUP -->
<div class="popup-overlay" id="historyPopup">
  <div class="popup-box">
  <h2>Lịch sử</h2>
  <div id="historyContent"></div>
  <button class="close-btn" onclick="closeHistory()">Đóng</button>
</div></div>

<script>
let data = JSON.parse(localStorage.getItem("chipTayData")) || [];
let tipData = JSON.parse(localStorage.getItem("chipTipData")) || [];
let cocTotal = parseInt(localStorage.getItem("chipCocData")) || 0;
let historyData = JSON.parse(localStorage.getItem("chipHistoryData")) || {};

function formatMoney(num) {
  return num.toLocaleString("vi-VN") + " đ";
}

function getCurrentTime() {
  const now = new Date();
  return now.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });
}

function saveAll() {
  localStorage.setItem("chipTayData", JSON.stringify(data));
  localStorage.setItem("chipTipData", JSON.stringify(tipData));
  localStorage.setItem("chipCocData", cocTotal);
  localStorage.setItem("chipHistoryData", JSON.stringify(historyData));
}

function updateUI() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0;

  data.forEach((item, index) => {
    total += item.amount;
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="item-top">
        <strong>${formatMoney(item.amount)}</strong>
        <div class="actions">
          <button class="edit-btn" onclick="editItem(${index})">Sửa</button>
          <button class="delete-btn" onclick="deleteItem(${index})">Xóa</button>
        </div>
      </div>
      <div class="time">${item.time}</div>
    `;
    list.appendChild(div);
  });

  document.getElementById("total").innerText =
    "Tổng hôm nay: " + formatMoney(total);

  let tipTotal = tipData.reduce((a,b)=>a+b.amount,0);
  document.getElementById("tipTotal").innerText =
    "Tip: " + formatMoney(tipTotal);

  updateTipPopup();
  updateCocPopup();
}

function addMoney() {
  const input = document.getElementById("moneyInput");
  let val = parseInt(input.value);
  if (!val) return;
  val = val * 100000;

  data.push({ amount: val, time: getCurrentTime() });
  saveAll();
  updateUI();
  input.value = "";
}

function editItem(index) {
  let newVal = prompt("Nhập lại số:", data[index].amount / 100000);
  if (newVal === null) return;
  newVal = parseInt(newVal);
  if (!newVal) return;
  data[index].amount = newVal * 100000;
  saveAll();
  updateUI();
}

function deleteItem(index) {
  if (confirm("Bạn chắc chắn muốn xóa?")) {
    data.splice(index, 1);
    saveAll();
    updateUI();
  }
}

function addTip() {
  let input = document.getElementById("tipInput");
  let val = parseInt(input.value);
  if (!val) return;
  val *= 100000;
  tipData.push({ amount: val, time: getCurrentTime() });
  saveAll();
  updateUI();
  input.value = "";
}

function updateTipPopup() {
  let list = document.getElementById("tipList");
  list.innerHTML = "";
  let total = 0;
  tipData.forEach(t=>{
    total+=t.amount;
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<strong>${formatMoney(t.amount)}</strong>
                   <div class="time">${t.time}</div>`;
    list.appendChild(div);
  });
  document.getElementById("tipPopupTotal").innerText =
    "Tổng Tip: " + formatMoney(total);
}

function addCoc() {
  let input = document.getElementById("cocInput");
  let val = parseInt(input.value);
  if (!val) return;
  cocTotal += val * 100000;
  saveAll();
  updateUI();
  input.value="";
}

function updateCocPopup() {
  document.getElementById("cocTotal").innerText =
    "Tổng Cọc: " + formatMoney(cocTotal);
}

function resetAll() {
  if (!confirm("Reset toàn bộ dữ liệu?")) return;

  let incomeTotal = data.reduce((a,b)=>a+b.amount,0);
  let tipTotal = tipData.reduce((a,b)=>a+b.amount,0);

  let today = new Date();
  today.setDate(today.getDate()-1);
  let key = today.toISOString().split("T")[0];

  historyData[key] = {
    income: incomeTotal,
    tip: tipTotal
  };

  data = [];
  tipData = [];
  saveAll();
  updateUI();
}

function openTip(){ document.getElementById("tipPopup").style.display="block"; }
function closeTip(){ document.getElementById("tipPopup").style.display="none"; }

function openCoc(){ document.getElementById("cocPopup").style.display="block"; }
function closeCoc(){ document.getElementById("cocPopup").style.display="none"; }

function openHistory(){
  let content=document.getElementById("historyContent");
  content.innerHTML="";
  let grouped={};

  for(let date in historyData){
    let month=date.slice(0,7);
    if(!grouped[month]) grouped[month]={income:0,tip:0,days:[]};
    grouped[month].income+=historyData[date].income;
    grouped[month].tip+=historyData[date].tip;
    grouped[month].days.push({date,...historyData[date]});
  }

  for(let month in grouped){
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<strong>${month}</strong>
      <div>Thu nhập: ${formatMoney(grouped[month].income)}</div>
      <div>Tip: ${formatMoney(grouped[month].tip)}</div>`;
    content.appendChild(div);

    grouped[month].days.forEach(d=>{
      let day=document.createElement("div");
      day.style.padding="8px 15px";
      day.innerHTML=`${d.date} | Thu nhập: ${formatMoney(d.income)} | Tip: ${formatMoney(d.tip)}`;
      content.appendChild(day);
    });
  }

  document.getElementById("historyPopup").style.display="block";
}
function closeHistory(){ document.getElementById("historyPopup").style.display="none"; }

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("chipTheme",
    document.body.classList.contains("dark") ? "dark" : "light");
}

document.getElementById("moneyInput")
  .addEventListener("keypress", e=>{ if(e.key==="Enter") addMoney(); });
document.getElementById("tipInput")
  .addEventListener("keypress", e=>{ if(e.key==="Enter") addTip(); });
document.getElementById("cocInput")
  .addEventListener("keypress", e=>{ if(e.key==="Enter") addCoc(); });

if (localStorage.getItem("chipTheme") === "dark") {
  document.body.classList.add("dark");
}

updateUI();
</script>
<img src="Capture.PNG" class="corner-image">
</body>
</html>
